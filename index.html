<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Daily Echo - Your Personal Diary</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%236366f1'/><text x='50' y='60' font-size='50' font-weight='bold' text-anchor='middle' fill='white'>📔</text></svg>">

<style>
:root{
  --primary:#6366f1;
  --secondary:#8b5cf6;
  --bg:#020617;
  --card:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#f8fafc;
  --muted:#94a3b8;
  --danger:#ef4444;
  --success:#10b981;
  --radius-sm:12px;
  --radius-md:16px;
  --radius-lg:24px;
  --radius-xl:32px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',-apple-system,'Segoe UI',sans-serif;
}

html, body{
  width:100%;
  height:100%;
}

body{
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left,#312e81 0%,transparent 35%),
    radial-gradient(circle at bottom right,#581c87 0%,transparent 35%),
    #020617;
  z-index:-1;
  pointer-events:none;
}

/* ──────────────────────────
   NAVBAR
──────────────────────────── */
nav{
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  min-height:64px;
  background:rgba(2,6,23,.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  gap:12px;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
  flex:1;
}

.nav-logo-img{
  width:40px;
  height:40px;
  border-radius:var(--radius-md);
  object-fit:cover;
  flex-shrink:0;
}

.logo{
  font-size:1.4rem;
  font-weight:900;
  background:linear-gradient(45deg,#818cf8,#c084fc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  white-space:nowrap;
}

.nav-right{
  display:flex;
  gap:10px;
  align-items:center;
  flex-shrink:0;
}

.top-btn{
  background:var(--card);
  border:1px solid var(--border);
  color:white;
  padding:10px 16px;
  border-radius:var(--radius-md);
  cursor:pointer;
  font-weight:700;
  transition:.25s ease;
  font-size:0.9rem;
  white-space:nowrap;
  min-height:40px;
  display:flex;
  align-items:center;
}

.top-btn:hover{
  transform:translateY(-2px);
  background:rgba(99,102,241,.12);
  border-color:rgba(99,102,241,.3);
}

.top-btn:active{
  transform:translateY(0);
}

/* ──────────────────────────
   HEADER CARD
──────────────────────────── */
.header-card{
  max-width:1200px;
  width:100%;
  margin:24px auto;
  padding:28px 24px;
  border:1px solid var(--border);
  background:var(--card);
  backdrop-filter:blur(20px);
  border-radius:var(--radius-xl);
}

.header-card h1{
  font-size:2.2rem;
  margin-bottom:12px;
  line-height:1.2;
}

.header-card p{
  color:var(--muted);
  line-height:1.6;
  font-size:1rem;
}

/* ──────────────────────────
   TABS
──────────────────────────── */
.tabs-wrapper{
  max-width:1200px;
  width:100%;
  margin:20px auto;
  padding:0 20px;
}

.tabs{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
}

.tab{
  padding:11px 22px;
  border-radius:var(--radius-md);
  background:var(--card);
  border:1px solid var(--border);
  font-weight:700;
  cursor:pointer;
  transition:.25s ease;
  white-space:nowrap;
  font-size:0.95rem;
  min-height:42px;
  display:flex;
  align-items:center;
  touch-action:manipulation;
}

.tab:hover{
  background:rgba(99,102,241,.08);
  border-color:rgba(99,102,241,.2);
}

.tab.active{
  background:var(--primary);
  border-color:var(--primary);
  color:white;
  box-shadow:0 4px 12px rgba(99,102,241,.3);
}

/* ──────────────────────────
   CONTAINER & GRID
──────────────────────────── */
.container{
  max-width:1200px;
  width:100%;
  margin:0 auto;
  padding:24px 20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:20px;
}

/* ──────────────────────────
   CARDS
──────────────────────────── */
.card{
  position:relative;
  border-radius:var(--radius-lg);
  overflow:hidden;
  background:var(--card);
  border:1px solid var(--border);
  backdrop-filter:blur(16px);
  transition:.35s cubic-bezier(.23,1,.32,1);
  display:flex;
  flex-direction:column;
  will-change:transform;
}

.card:hover{
  transform:translateY(-6px);
  border-color:rgba(99,102,241,.5);
  background:rgba(99,102,241,.06);
}

@media (hover: none) {
  .card:hover{
    transform:none;
  }
}

.card.deleted-card{
  border:1px solid rgba(239,68,68,.3);
  background:rgba(127,29,29,.15);
  opacity:.85;
}

.card.deleted-card .card-header{
  filter:grayscale(.7);
}

.card-header{
  padding:32px 20px;
  font-size:1.2rem;
  font-weight:800;
  min-height:110px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  word-break:break-word;
  line-height:1.3;
  flex-shrink:0;
}

.card-body{
  padding:20px;
  flex:1;
  display:flex;
  flex-direction:column;
}

.card-date{
  font-size:.75rem;
  font-weight:800;
  color:#a5b4fc;
  margin-bottom:10px;
  display:block;
  text-transform:uppercase;
  letter-spacing:.5px;
}

.card-desc{
  line-height:1.7;
  color:var(--muted);
  white-space:pre-wrap;
  word-break:break-word;
  flex:1;
  font-size:0.95rem;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:6;
  -webkit-box-orient:vertical;
}

.card-actions{
  display:flex;
  gap:10px;
  margin-top:16px;
  flex-wrap:wrap;
}

.small-btn{
  flex:1;
  min-width:80px;
  padding:11px 12px;
  border:none;
  border-radius:var(--radius-md);
  font-weight:700;
  cursor:pointer;
  transition:.25s ease;
  font-size:0.85rem;
  min-height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

.edit-btn      { background:rgba(59,130,246,.18);  color:#93c5fd; border:1px solid rgba(59,130,246,.2); }
.delete-btn    { background:rgba(239,68,68,.18);   color:#fca5a5; border:1px solid rgba(239,68,68,.2); }
.restore-btn   { background:rgba(16,185,129,.18);  color:#6ee7b7; border:1px solid rgba(16,185,129,.2); }
.permanent-btn { background:rgba(239,68,68,.25);   color:#fecaca; border:1px solid rgba(239,68,68,.3); }

.small-btn:hover{
  transform:translateY(-2px);
  filter:brightness(1.2);
}

.small-btn:active{
  transform:translateY(0);
}

@media (hover: none) {
  .small-btn:hover{
    transform:none;
  }
}

/* ──────────────────────────
   FAB
──────────────────────────── */
.fab{
  position:fixed;
  right:20px;
  bottom:20px;
  width:64px;
  height:64px;
  border:none;
  border-radius:var(--radius-lg);
  background:var(--primary);
  color:white;
  font-size:1.8rem;
  font-weight:900;
  cursor:pointer;
  box-shadow:0 20px 50px rgba(99,102,241,.4);
  transition:.3s ease;
  z-index:50;
  touch-action:manipulation;
  display:flex;
  align-items:center;
  justify-content:center;
  will-change:transform;
}

.fab:hover{
  transform:rotate(90deg) scale(1.08);
  box-shadow:0 25px 60px rgba(99,102,241,.5);
}

.fab:active{
  transform:rotate(90deg) scale(1.02);
}

@media (hover: none) {
  .fab:hover{
    transform:scale(1.05);
  }
}

/* ──────────────────────────
   MODAL OVERLAY
──────────────────────────── */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.75);
  backdrop-filter:blur(6px);
  display:none;
  align-items:center;
  justify-content:center;
  padding:16px;
  z-index:999;
  animation:fadeIn .2s ease;
}

.overlay.show{ display:flex; }

@keyframes fadeIn{
  from{ opacity:0; }
  to{   opacity:1; }
}

.modal{
  width:100%;
  max-width:600px;
  max-height:90vh;
  background:#0f172a;
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:28px;
  animation:slideUp .3s cubic-bezier(.16,1,.3,1);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

@keyframes slideUp{
  from{ opacity:0; transform:translateY(40px) }
  to{   opacity:1; transform:translateY(0)  }
}

.modal h2{
  margin-bottom:24px;
  font-size:1.4rem;
}

/* ──────────────────────────
   FORM ELEMENTS
──────────────────────────── */
.form-group{
  margin-bottom:18px;
}

.form-group label{
  display:block;
  margin-bottom:8px;
  color:#cbd5e1;
  font-weight:700;
  font-size:0.95rem;
}

.form-actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:10px;
}

.form-actions button{
  background:rgba(255,255,255,.08);
  border:1px solid var(--border);
  color:white;
  padding:10px 14px;
  border-radius:var(--radius-md);
  cursor:pointer;
  font-weight:600;
  font-size:0.85rem;
  transition:.25s ease;
  touch-action:manipulation;
}

.form-actions button:hover{
  background:rgba(255,255,255,.12);
  border-color:rgba(255,255,255,.2);
}

input, textarea, select{
  width:100%;
  margin-bottom:8px;
  padding:14px;
  border-radius:var(--radius-md);
  border:1px solid var(--border);
  background:#111827;
  color:white;
  font-size:16px;
  outline:none;
  transition:.25s ease;
  font-family:inherit;
}

input:focus, textarea:focus, select:focus{
  border-color:var(--primary);
  background:#1e293b;
  box-shadow:0 0 0 3px rgba(99,102,241,.1);
}

textarea{
  resize:vertical;
  min-height:140px;
  font-family:'Menlo','Monaco','Courier New',monospace;
}

input[type="date"]{
  cursor:pointer;
}

.input-counter{
  margin-top:-6px;
  margin-bottom:12px;
  color:#94a3b8;
  font-size:0.8rem;
  text-align:right;
  font-weight:600;
}

.main-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:var(--radius-md);
  background:var(--primary);
  color:white;
  font-weight:800;
  font-size:1rem;
  cursor:pointer;
  transition:.25s ease;
  touch-action:manipulation;
  margin-top:8px;
}

.main-btn:hover{
  background:var(--secondary);
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(99,102,241,.3);
}

.main-btn:active{
  transform:translateY(0);
}

/* ──────────────────────────
   EMPTY STATE
──────────────────────────── */
.empty{
  grid-column:1/-1;
  padding:60px 20px;
  text-align:center;
  color:var(--muted);
}

.empty h2{
  margin-bottom:12px;
  font-size:1.3rem;
  color:var(--text);
}

.empty p{
  font-size:1rem;
  line-height:1.6;
}

/* ──────────────────────────
   FOOTER
──────────────────────────── */
footer{
  margin-top:60px;
  padding:40px 20px 30px;
  border-top:1px solid var(--border);
  text-align:center;
  color:var(--muted);
}

footer p{
  margin-bottom:20px;
  font-weight:600;
}

.footer-links{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}

.footer-link{
  color:#a5b4fc;
  text-decoration:none;
  font-weight:700;
  font-size:0.9rem;
  transition:.2s ease;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.footer-link:hover{
  color:var(--secondary);
  transform:translateY(-1px);
}

/* ──────────────────────────
   TOAST NOTIFICATION (for feedback)
──────────────────────────── */
.toast{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(16,185,129,.9);
  color:white;
  padding:14px 20px;
  border-radius:var(--radius-md);
  font-weight:600;
  z-index:1000;
  animation:slideUp .3s ease;
  max-width:90%;
  text-align:center;
}

.toast.error{
  background:rgba(239,68,68,.9);
}

@keyframes slideUp{
  from{ opacity:0; transform:translateX(-50%) translateY(20px); }
  to{   opacity:1; transform:translateX(-50%) translateY(0); }
}

/* ══════════════════════════
   RESPONSIVE - 480px MOBILE
══════════════════════════ */
@media (max-width: 480px) {

  nav{
    padding:10px 12px;
    min-height:56px;
  }

  .nav-logo-img{
    width:36px;
    height:36px;
  }

  .logo{
    font-size:1.1rem;
  }

  .top-btn{
    padding:8px 12px;
    font-size:0.8rem;
    min-height:36px;
  }

  .header-card{
    margin:16px auto;
    padding:20px 16px;
    border-radius:24px;
  }

  .header-card h1{
    font-size:1.6rem;
  }

  .header-card p{
    font-size:0.9rem;
  }

  .tabs-wrapper{
    padding:0 12px;
  }

  .tabs{
    gap:8px;
  }

  .tab{
    padding:9px 16px;
    font-size:0.8rem;
    min-height:38px;
  }

  .container{
    padding:16px 12px;
  }

  .grid{
    grid-template-columns:1fr;
    gap:12px;
  }

  .card{
    border-radius:20px;
  }

  .card-header{
    padding:24px 16px;
    min-height:90px;
    font-size:1.1rem;
  }

  .card-body{
    padding:16px;
  }

  .card-date{
    font-size:0.7rem;
  }

  .card-desc{
    font-size:0.9rem;
    -webkit-line-clamp:5;
  }

  .small-btn{
    padding:10px;
    font-size:0.8rem;
    min-height:36px;
  }

  .fab{
    width:56px;
    height:56px;
    font-size:1.5rem;
    right:16px;
    bottom:16px;
  }

  .modal{
    padding:20px;
    border-radius:24px 24px 0 0;
  }

  .modal h2{
    font-size:1.2rem;
    margin-bottom:18px;
  }

  input, textarea, select{
    padding:12px;
    font-size:16px;
  }

  .main-btn{
    padding:12px;
  }

  .empty{
    padding:40px 16px;
  }

  .footer-links{
    gap:12px;
  }

}

/* ══════════════════════════
   RESPONSIVE - 640px TABLET
══════════════════════════ */
@media (max-width: 768px) {

  .header-card h1{
    font-size:1.8rem;
  }

  .grid{
    grid-template-columns:repeat(2,1fr);
  }

}

/* ══════════════════════════
   RESPONSIVE - TABLET UP
══════════════════════════ */
@media (min-width: 768px) and (max-width: 1024px) {

  .container{
    padding:28px 24px;
  }

  .grid{
    grid-template-columns:repeat(2,1fr);
  }

}

/* ══════════════════════════
   RESPONSIVE - LARGE SCREENS
══════════════════════════ */
@media (min-width: 1024px) {

  nav{
    padding:14px 28px;
  }

  .header-card{
    margin:32px auto;
    padding:32px 40px;
  }

  .tabs-wrapper{
    padding:0 28px;
  }

  .container{
    padding:32px 28px;
  }

  .grid{
    grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
    gap:24px;
  }

  .card:hover{
    transform:translateY(-8px);
  }

}

/* ══════════════════════════
   SCROLLBAR STYLING
══════════════════════════ */
::-webkit-scrollbar{
  width:8px;
  height:8px;
}

::-webkit-scrollbar-track{
  background:transparent;
}

::-webkit-scrollbar-thumb{
  background:rgba(99,102,241,.4);
  border-radius:4px;
}

::-webkit-scrollbar-thumb:hover{
  background:rgba(99,102,241,.6);
}

</style>
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <div class="nav-left">
    <svg class="nav-logo-img" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
        </linearGradient>
      </defs>
      <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
      <text x="50" y="65" font-size="48" font-weight="bold" text-anchor="middle" fill="white">📔</text>
    </svg>
    <div class="logo">DailyECHO</div>
  </div>
  <div class="nav-right">
    <button class="top-btn" onclick="exportBackup()" title="Export backup">💾</button>
    <button class="top-btn" onclick="deleteAllData()">🗑 Delete All</button>
  </div>
</nav>

<!-- ── HEADER ── -->
<div class="header-card">
  <h1>Your Private Space</h1>
  <p>Save memories, thoughts, notes, late-night ideas, and important moments — all stored locally inside your browser.</p>
</div>

<!-- ── TABS ── -->
<div class="tabs-wrapper">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('moments',event)">✨ Moments</div>
    <div class="tab" onclick="switchTab('notes',event)">📝 Notes</div>
    <div class="tab" onclick="switchTab('deleted',event)">🗑 Recently Deleted</div>
  </div>
</div>

<!-- ── GRID ── -->
<div class="container">
  <div class="grid" id="grid"></div>
</div>

<!-- ── FAB ── -->
<button class="fab" onclick="openModal()" title="Add new entry" aria-label="Add new entry">+</button>

<!-- ── MODAL OVERLAY ── -->
<div class="overlay" id="entryOverlay" onclick="closeEntryOverlay(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">New Entry</h2>

    <div class="form-group">
      <select id="entryType">
        <option value="moment">✨ Moment</option>
        <option value="note">📝 Note</option>
      </select>
    </div>

    <div class="form-group">
      <label for="title">Title (45 characters max)</label>
      <input type="text" id="title" maxlength="45" placeholder="Enter title...">
      <div class="input-counter"><span id="charCount">0</span> / 45</div>
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date">
    </div>

    <div class="form-group">
      <div class="form-actions">
        <label for="desc">Description</label>
        <button type="button" onclick="toggleFullscreen()" title="Toggle fullscreen">🖥️ Fullscreen</button>
      </div>
      <textarea id="desc" maxlength="1000" placeholder="Write something..."></textarea>
      <div class="input-counter"><span id="wordCount">0</span> / 1000</div>
    </div>

    <button class="main-btn" onclick="saveEntry()">Save Entry</button>
  </div>
</div>

<!-- ── FOOTER ── -->
<footer>
  <p>Developed with ❤️ by Mohak</p>
  <div class="footer-links">
    <a class="footer-link" href="feedback.html">💬 Feedback</a>
    <a class="footer-link" href="about.html"> ℹ️ About</a>
    <a class="footer-link" href="https://github.com" target="_blank" rel="noopener noreferrer">🌐 GitHub</a>
  </div>
</footer>

<script>
let currentTab = 'moments';
let editId = null;

const gradients = [
  'linear-gradient(135deg,#6366f1,#8b5cf6)',
  'linear-gradient(135deg,#ec4899,#8b5cf6)',
  'linear-gradient(135deg,#3b82f6,#06b6d4)',
  'linear-gradient(135deg,#10b981,#14b8a6)',
  'linear-gradient(135deg,#f59e0b,#ef4444)',
  'linear-gradient(135deg,#8b5cf6,#d946ef)'
];

function getTodayLocalISO() {
  const now = new Date();
  const tzOffset = now.getTimezoneOffset() * 60000;
  return new Date(now.getTime() - tzOffset).toISOString().split('T')[0];
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('title').addEventListener('input', (e) => {
    document.getElementById('charCount').innerText = e.target.value.length;
  });
  document.getElementById('desc').addEventListener('input', (e) => {
    document.getElementById('wordCount').innerText = e.target.value.length;
  });
  
  setToday();
  loadData();
});

function setToday() {
  document.getElementById('date').value = getTodayLocalISO();
}

function switchTab(tab, event) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (event && event.target) {
    event.target.closest('.tab').classList.add('active');
  }
  loadData();
}

function openModal() {
  editId = null;
  document.getElementById('modalTitle').innerText = 'New Entry';
  document.getElementById('title').value = '';
  document.getElementById('desc').value = '';
  document.getElementById('entryType').value = currentTab === 'notes' ? 'note' : 'moment';
  document.getElementById('charCount').innerText = '0';
  document.getElementById('wordCount').innerText = '0';
  setToday();
  document.getElementById('entryOverlay').classList.add('show');
}

function closeEntryOverlay(event) {
  if (!event || event.target === event.currentTarget) {
    document.getElementById('entryOverlay').classList.remove('show');
  }
}

function getData() {
  try { return JSON.parse(localStorage.getItem('echoData') || '[]'); }
  catch { return []; }
}

function getDeleted() {
  try { return JSON.parse(localStorage.getItem('echoDeleted') || '[]'); }
  catch { return []; }
}

function saveMain(data) { localStorage.setItem('echoData', JSON.stringify(data)); }
function saveDeleted(data) { localStorage.setItem('echoDeleted', JSON.stringify(data)); }

function saveEntry() {
  const title = document.getElementById('title').value.trim();
  const desc = document.getElementById('desc').value.trim();
  const date = document.getElementById('date').value;
  const type = document.getElementById('entryType').value;

  if (!title || !desc || !date) {
    showToast('Please fill all fields', true);
    return;
  }

  const data = getData();

  if (editId !== null) {
    const item = data.find(x => x.id === editId);
    if (!item) {
      showToast('Entry not found', true);
      return;
    }
    item.title = title;
    item.desc = desc;
    item.date = date;
    item.type = type;
  } else {
    data.push({
      id: Date.now(),
      title,
      desc,
      date,
      type,
      created: Date.now(),
      color: gradients[Math.floor(Math.random() * gradients.length)]
    });
  }

  saveMain(data);
  editId = null;
  closeEntryOverlay();
  loadData();
  showToast(editId !== null ? 'Entry updated!' : 'Entry saved!');
}

function loadData() {
  const grid = document.getElementById('grid');
  const data = currentTab === 'deleted'
    ? getDeleted()
    : getData().filter(x => x.type === (currentTab === 'moments' ? 'moment' : 'note'));

  if (data.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <h2>📭 No entries yet</h2>
        <p>Click the + button to create your first ${currentTab === 'deleted' ? 'memory' : currentTab}!</p>
      </div>`;
    return;
  }

  grid.innerHTML = [...data].reverse().map(item => `
    <div class="card ${currentTab === 'deleted' ? 'deleted-card' : ''}">
      <div class="card-header" style="background:${item.color || gradients[0]}">
        ${escapeHtml(item.title || 'Untitled')}
      </div>
      <div class="card-body">
        <span class="card-date">${escapeHtml(item.date || '')}</span>
        <p class="card-desc">${escapeHtml(item.desc || '')}</p>
        <div class="card-actions">
          ${currentTab !== 'deleted'
            ? `<button class="small-btn edit-btn" onclick="editEntry(${item.id})">✏️ Edit</button>
               <button class="small-btn delete-btn" onclick="confirmDelete(${item.id})">🗑️ Delete</button>`
            : `<button class="small-btn restore-btn" onclick="restoreEntry(${item.id})">↩️ Restore</button>
               <button class="small-btn permanent-btn" onclick="permanentDelete(${item.id})">🔴 Delete Forever</button>`
          }
        </div>
      </div>
    </div>
  `).join('');
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function editEntry(id) {
  const item = getData().find(x => x.id === id);
  if (!item) return;
  
  editId = id;
  document.getElementById('modalTitle').innerText = `Edit Entry`;
  document.getElementById('title').value = item.title || '';
  document.getElementById('desc').value = item.desc || '';
  document.getElementById('date').value = item.date || getTodayLocalISO();
  document.getElementById('entryType').value = item.type || 'moment';
  document.getElementById('charCount').innerText = (item.title || '').length;
  document.getElementById('wordCount').innerText = (item.desc || '').length;
  document.getElementById('entryOverlay').classList.add('show');
  
  // Scroll to top of modal
  document.querySelector('.modal').scrollTop = 0;
}

function confirmDelete(id) {
  if (confirm('Delete this entry? It will be moved to Recently Deleted.')) {
    deleteEntry(id);
  }
}

function deleteEntry(id) {
  const data = getData();
  const deleted = getDeleted();
  const item = data.find(x => x.id === id);
  if (!item) return;
  
  deleted.push({ ...item, deletedAt: Date.now() });
  saveMain(data.filter(x => x.id !== id));
  saveDeleted(deleted);
  loadData();
  showToast('Entry deleted. View in Recently Deleted tab.');
}

function restoreEntry(id) {
  const data = getData();
  const deleted = getDeleted();
  const item = deleted.find(x => x.id === id);
  if (!item) return;
  
  const restored = { ...item };
  delete restored.deletedAt;
  data.push(restored);
  saveMain(data);
  saveDeleted(deleted.filter(x => x.id !== id));
  loadData();
  showToast('Entry restored!');
}

function permanentDelete(id) {
  if (confirm('Permanently delete this entry? This cannot be undone.')) {
    saveDeleted(getDeleted().filter(x => x.id !== id));
    loadData();
    showToast('Entry permanently deleted.');
  }
}

function deleteAllData() {
  if (confirm('⚠️ Delete ALL data permanently? This cannot be undone.')) {
    localStorage.removeItem('echoData');
    localStorage.removeItem('echoDeleted');
    editId = null;
    closeEntryOverlay();
    loadData();
    showToast('All data deleted.');
  }
}

function toggleFullscreen() {
  const textarea = document.getElementById('desc');
  if (!document.fullscreenElement) {
    textarea.requestFullscreen().catch(err => {
      showToast('Fullscreen not available', true);
      console.log('Fullscreen error:', err);
    });
  } else {
    document.exitFullscreen();
  }
}

function exportBackup() {
  const data = getData();
  if (data.length === 0) {
    showToast('No data to export', true);
    return;
  }
  
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `daily-echo-backup-${getTodayLocalISO()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup exported!');
}

function showToast(message, isError = false) {
  const toast = document.createElement('div');
  toast.className = `toast ${isError ? 'error' : ''}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  
  setTimeout(() => {
    toast.style.animation = 'slideUp .3s ease reverse';
    setTimeout(() => toast.remove(), 300);
  }, 2000);
}
</script>
