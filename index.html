<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Echo | Cloud Diary</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script> 
       <link rel="stylesheet" href="assets/Index.css">
  
</head>
<body data-theme="light">

    <div id="auth-screen">
        <div class="auth-card">
            <h1>Daily Echo</h1>
            <p>Welcome back, please sign in.</p>
            <button class="btn google-btn" onclick="signInWithGoogle()">Sign in with Google</button>
            <div id="recaptcha-container"></div>
            <input type="text" id="phoneNum" placeholder="+91 0000000000">
            <button class="btn phone-btn" onclick="signInWithPhone()">Sign in with Mobile</button>
        </div>
    </div>

    <header>
        <h3 style="margin:0">Daily Echo</h3>
        <button onclick="toggleSettings()" style="background:none; border:none; font-size: 20px; cursor:pointer;">⚙️</button>
    </header>

    <div id="settings-menu">
        <h2>Settings</h2>
        <hr>
        <p>Appearance</p>
        <button class="btn" onclick="toggleTheme()" id="tBtn">Dark Mode</button>
        
        <p>Language</p>
        <select class="btn" id="langSelect">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
        </select>

        <p>Danger Zone</p>
        <button class="btn del-btn" onclick="dangerAction('clear')">Clear All Memories</button>
        <button class="btn del-btn" style="opacity:0.7" onclick="dangerAction('deleteAcc')">Delete Account</button>
        <br><br>
        <button class="btn" onclick="firebase.auth().signOut()">Logout</button>
    </div>

    <div class="container">
        <div class="grid" id="grid"></div>
    </div>

    <button class="fab" onclick="showModal()">+</button>

    <div class="overlay" id="overlay" onclick="hideModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h3 id="mTitle" style="margin-top:0">Add Memory</h3>
            <input type="text" id="title" placeholder="Title (Max 45 chars)" maxlength="45">
            <input type="date" id="date">
            <textarea id="desc" rows="4" placeholder="Description..."></textarea>
            <input type="hidden" id="editId">
            <button class="btn save-btn" onclick="handleSave()">Save Memory</button>
        </div>
    </div>


     <script type="module" src="assets/Index.js"></script>

</body>
</html>
