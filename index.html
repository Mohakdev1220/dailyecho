<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Echo | Your Personal Diary</title> 
     <link rel="stylesheet" href="assets/Index.css">
    
    
</head>
<body>

    <div class="bg-animate"></div>

    <nav>
        <div class="logo">ECHO</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <span id="storageInfo" style="font-size: 0.85rem; color: #94a3b8;"></span>
            <button onclick="exportData()" style="background:none; border:none; font-size: 24px; cursor:pointer;" title="Export Data">💾</button>
        </div>
    </nav>

    <div class="top-widget">
        <div class="weather-card">
            <div class="date-section">
                <h2 id="currentDate">Loading...</h2>
                <p id="currentDay">...</p>
            </div>
            <div class="weather-section">
                <div class="weather-temp" id="weatherTemp">--°</div>
                <div class="weather-desc" id="weatherDesc">Loading weather...</div>
                <div class="weather-location" id="weatherLocation">📍 Detecting location...</div>
            </div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('targets')">🎯 Daily Targets</div>
        <div class="tab" onclick="switchTab('moments')">✨ Special Moments</div>
        <div class="tab" onclick="switchTab('notes')">📝 Notes</div>
    </div>

    <div class="container">
        <div class="grid" id="mainGrid"></div>
    </div>

    <button class="fab" onclick="openAddSheet()">+</button>

    <!-- Add Entry Sheet -->
    <div class="overlay" id="addSheet" onclick="toggleSheet('addSheet')">
        <div class="modal" onclick="event.stopPropagation()">
            <h1 style="margin-top:0" id="modalTitle">New Entry</h1>
            
            <select id="entryType">
                <option value="target">🎯 Daily Target</option>
                <option value="moment">✨ Special Moment</option>
                <option value="note">📝 Note</option>
            </select>

            <input type="text" id="title" placeholder="Title (Max 45 characters)" maxlength="45">
            <input type="date" id="date">
            <textarea id="desc" rows="5" placeholder="Description..."></textarea>
            
            <button class="btn btn-main" onclick="saveEntry()">Save Locally</button>
        </div>
    </div>

    <script type="module" src="assets/Index.js"></script>

</body>
</html>
