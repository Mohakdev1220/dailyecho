<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Daily Echo</title>

<style>
:root{
--primary:#6366f1;
--secondary:#8b5cf6;
--bg:#020617;
--card:rgba(255,255,255,0.04);
--border:rgba(255,255,255,0.08);
--text:#f8fafc;
--muted:#94a3b8;
--danger:#ef4444;
--success:#10b981;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,-apple-system,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#312e81 0%,transparent 35%),
radial-gradient(circle at bottom right,#581c87 0%,transparent 35%),
#020617;
z-index:-1;
}

nav{
position:sticky;
top:0;
z-index:100;
display:flex;
justify-content:space-between;
align-items:center;
padding:22px;
background:rgba(2,6,23,.8);
backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
}

.logo{
font-size:1.8rem;
font-weight:900;
background:linear-gradient(45deg,#818cf8,#c084fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.nav-right{
display:flex;
gap:12px;
align-items:center;
}

.top-btn{
background:var(--card);
border:1px solid var(--border);
color:white;
padding:12px 16px;
border-radius:16px;
cursor:pointer;
font-weight:700;
transition:.25s;
}

.top-btn:hover{
transform:translateY(-2px);
background:rgba(99,102,241,.12);
}

.header-card{
max-width:1200px;
margin:30px auto;
padding:30px;
border:1px solid var(--border);
background:var(--card);
backdrop-filter:blur(20px);
border-radius:32px;
}

.header-card h1{
font-size:2.4rem;
margin-bottom:10px;
}

.header-card p{
color:var(--muted);
line-height:1.6;
}

.tabs{
max-width:1200px;
margin:20px auto;
padding:0 20px;
display:flex;
gap:14px;
flex-wrap:wrap;
}

.tab{
padding:13px 24px;
border-radius:18px;
background:var(--card);
border:1px solid var(--border);
font-weight:700;
cursor:pointer;
transition:.25s;
}

.tab.active{
background:var(--primary);
border-color:var(--primary);
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
gap:24px;
}

.card{
position:relative;
border-radius:28px;
overflow:hidden;
background:var(--card);
border:1px solid var(--border);
backdrop-filter:blur(16px);
transition:.35s;
}

.card:hover{
transform:translateY(-8px);
border-color:rgba(99,102,241,.5);
}

.card-header{
padding:34px 24px;
font-size:1.3rem;
font-weight:800;
min-height:120px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.card-body{
padding:24px;
}

.card-date{
font-size:.8rem;
font-weight:800;
color:#a5b4fc;
margin-bottom:12px;
display:block;
text-transform:uppercase;
}

.card-desc{
line-height:1.7;
color:var(--muted);
white-space:pre-wrap;
word-break:break-word;
}

.card-actions{
display:flex;
gap:10px;
margin-top:18px;
flex-wrap:wrap;
}

.small-btn{
flex:1;
padding:12px;
border:none;
border-radius:14px;
font-weight:800;
cursor:pointer;
transition:.25s;
}

.edit-btn{
background:rgba(59,130,246,.18);
color:#93c5fd;
}

.delete-btn{
background:rgba(239,68,68,.18);
color:#fca5a5;
}

.restore-btn{
background:rgba(16,185,129,.18);
color:#6ee7b7;
}

.permanent-btn{
background:rgba(239,68,68,.25);
color:#fecaca;
}

.small-btn:hover{
transform:translateY(-2px);
}

.fab{
position:fixed;
right:25px;
bottom:25px;
width:75px;
height:75px;
border:none;
border-radius:24px;
background:var(--primary);
color:white;
font-size:2rem;
font-weight:900;
cursor:pointer;
box-shadow:0 20px 50px rgba(99,102,241,.4);
transition:.3s;
}

.fab:hover{
transform:rotate(90deg) scale(1.06);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
backdrop-filter:blur(8px);
display:none;
align-items:center;
justify-content:center;
padding:20px;
z-index:999;
}

.overlay.show{
display:flex;
}

.modal{
width:100%;
max-width:600px;
background:#0f172a;
border:1px solid var(--border);
border-radius:32px;
padding:30px;
animation:popup .25s ease;
}

@keyframes popup{
from{opacity:0;transform:scale(.9)}
to{opacity:1;transform:scale(1)}
}

.modal h2{
margin-bottom:20px;
}

input,textarea,select{
width:100%;
margin-bottom:16px;
padding:16px;
border-radius:18px;
border:1px solid var(--border);
background:#111827;
color:white;
font-size:1rem;
outline:none;
}

textarea{
resize:none;
}

.main-btn{
width:100%;
padding:16px;
border:none;
border-radius:18px;
background:var(--primary);
color:white;
font-weight:800;
font-size:1rem;
cursor:pointer;
}

.empty{
grid-column:1/-1;
padding:80px 20px;
text-align:center;
color:var(--muted);
}

.empty h2{
margin-bottom:10px;
}

@media(max-width:700px){
.header-card h1{
font-size:1.8rem;
}

.grid{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<nav>
<div class="logo">DailyECHO</div>

<div class="nav-right">
<button class="top-btn" onclick="exportData()">Export</button>
<button class="top-btn" onclick="deleteAllData()">Delete All</button>
</div>
</nav>

<div class="header-card">
<h1>Your Private Space</h1>
<p>Save memories, thoughts, notes, late-night ideas, and important moments — all stored locally inside your browser.</p>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('moments',event)">✨ Moments</div>
<div class="tab" onclick="switchTab('notes',event)">📝 Notes</div>
<div class="tab" onclick="switchTab('deleted',event)">🗑 Recently Deleted</div>
</div>

<div class="container">
<div class="grid" id="grid"></div>
</div>

<button class="fab" onclick="openModal()">+</button>

<div class="overlay" id="entryOverlay">
<div class="modal">
<h2 id="modalTitle">New Entry</h2>

<select id="entryType">
<option value="moment">✨ Moment</option>
<option value="note">📝 Note</option>
</select>

<input type="text" id="title" maxlength="45" placeholder="Title">
<input type="date" id="date">
<textarea rows="6" id="desc" placeholder="Write something..."></textarea>

<button class="main-btn" onclick="saveEntry()">Save Entry</button>
</div>
</div>

<script>
let currentTab='moments';
let editId=null;

const gradients=[
'linear-gradient(135deg,#6366f1,#8b5cf6)',
'linear-gradient(135deg,#ec4899,#8b5cf6)',
'linear-gradient(135deg,#3b82f6,#06b6d4)',
'linear-gradient(135deg,#10b981,#14b8a6)',
'linear-gradient(135deg,#f59e0b,#ef4444)'
];

window.onload=()=>{
setToday();
loadData();
};

function setToday(){
document.getElementById('date').value=new Date().toISOString().split('T')[0];
}

function switchTab(tab,event){
currentTab=tab;
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
event.target.classList.add('active');
loadData();
}

function openModal(){
editId=null;
document.getElementById('modalTitle').innerText='New Entry';
document.getElementById('title').value='';
document.getElementById('desc').value='';
setToday();
document.getElementById('entryOverlay').classList.add('show');
}

window.onclick=e=>{
if(e.target.id==='entryOverlay'){
document.getElementById('entryOverlay').classList.remove('show');
}
}

function getData(){
return JSON.parse(localStorage.getItem('echoData')||'[]');
}

function getDeleted(){
return JSON.parse(localStorage.getItem('echoDeleted')||'[]');
}

function saveMain(data){
localStorage.setItem('echoData',JSON.stringify(data));
}

function saveDeleted(data){
localStorage.setItem('echoDeleted',JSON.stringify(data));
}

function saveEntry(){
const title=document.getElementById('title').value.trim();
const desc=document.getElementById('desc').value.trim();
const date=document.getElementById('date').value;
const type=document.getElementById('entryType').value;

if(!title||!desc||!date){
alert('Fill all fields');
return;
}

let data=getData();

if(editId){
const item=data.find(x=>x.id===editId);
item.title=title;
item.desc=desc;
item.date=date;
item.type=type;
}else{
data.push({
id:Date.now(),
title,
desc,
date,
type,
created:Date.now(),
color:gradients[Math.floor(Math.random()*gradients.length)]
});
}

saveMain(data);
document.getElementById('entryOverlay').classList.remove('show');
loadData();
}

function loadData(){
const grid=document.getElementById('grid');

let data=currentTab==='deleted'
?getDeleted()
:getData().filter(x=>x.type===currentTab.slice(0,-1));

if(data.length===0){
grid.innerHTML=`
<div class="empty">
<h2>No entries found</h2>
<p>Create your first entry using the + button.</p>
</div>`;
return;
}

grid.innerHTML=data.reverse().map(item=>`
<div class="card">
<div class="card-header" style="background:${item.color}">
${item.title}
</div>

<div class="card-body">
<span class="card-date">${item.date}</span>
<p class="card-desc">${item.desc}</p>

<div class="card-actions">
${currentTab!=='deleted'?
`<button class="small-btn edit-btn" onclick="editEntry(${item.id})">Edit</button>
<button class="small-btn delete-btn" onclick="deleteEntry(${item.id})">Delete</button>`
:
`<button class="small-btn restore-btn" onclick="restoreEntry(${item.id})">Restore</button>
<button class="small-btn permanent-btn" onclick="permanentDelete(${item.id})">Delete Forever</button>`}
</div>
</div>
</div>`).join('');
}

function editEntry(id){
const item=getData().find(x=>x.id===id);
if(!item)return;

editId=id;
document.getElementById('modalTitle').innerText='Edit Entry';
document.getElementById('title').value=item.title;
document.getElementById('desc').value=item.desc;
document.getElementById('date').value=item.date;
document.getElementById('entryType').value=item.type;

document.getElementById('entryOverlay').classList.add('show');
}

function deleteEntry(id){
let data=getData();
let deleted=getDeleted();

const item=data.find(x=>x.id===id);
if(!item)return;

item.deletedAt=Date.now();
deleted.push(item);

data=data.filter(x=>x.id!==id);

saveMain(data);
saveDeleted(deleted);
loadData();
}

function restoreEntry(id){
let data=getData();
let deleted=getDeleted();

const item=deleted.find(x=>x.id===id);
if(!item)return;

delete item.deletedAt;
data.push(item);

deleted=deleted.filter(x=>x.id!==id);

saveMain(data);
saveDeleted(deleted);
loadData();
}

function permanentDelete(id){
let deleted=getDeleted();
deleted=deleted.filter(x=>x.id!==id);
saveDeleted(deleted);
loadData();
}

function deleteAllData(){
if(confirm('Delete ALL data permanently?')){
localStorage.removeItem('echoData');
localStorage.removeItem('echoDeleted');
loadData();
}
}

function exportData(){
const payload={
data:getData(),
deleted:getDeleted(),
exported:new Date().toISOString()
};

const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
const url=URL.createObjectURL(blob);

const a=document.createElement('a');
a.href=url;
a.download='daily-echo-backup.json';
a.click();

URL.revokeObjectURL(url);
}
</script>

</body>
</html>
